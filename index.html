<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undercover - Confidential Dossier</title>
    
    <!-- FAVICON ESPION EMBARQUÉ (ZÉRO FICHIER EXTERNE) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🕵️‍♂️</text></svg>">

    <style>
        :root {
            --bg-dark: #07080a;
            --panel-bg: rgba(14, 17, 23, 0.85);
            --accent-radar: #ff2a2a;
            --accent-radar-glow: rgba(255, 42, 42, 0.3);
            --detective-blue: #00e5ff;
            --detective-blue-glow: rgba(0, 229, 255, 0.2);
            --text-neon: #f0f3f8;
            --text-dark-muted: #5e697a;
            --status-clear: #00ff66;
            --border-tech: rgba(255, 255, 255, 0.05);
            --apple-spring: cubic-bezier(0.2, 1, 0.4, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Mono", "SF Pro Display", Menlo, Monaco, Consolas, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-dark);
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.005) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.005) 1px, transparent 1px),
                radial-gradient(circle at 50% 30%, rgba(255, 42, 42, 0.12), transparent 65%);
            background-size: 20px 20px, 20px 20px, auto;
            color: var(--text-neon);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            overflow-x: hidden;
        }

        /* Boîtier Dossier Central */
        .glass-card {
            background: var(--panel-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 24px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .glass-card::before, .glass-card::after {
            content: ''; position: absolute; width: 14px; height: 14px; border-color: var(--accent-radar); border-style: solid; opacity: 0.6; pointer-events: none;
        }
        .glass-card::before { top: 12px; left: 12px; border-width: 2px 0 0 2px; }
        .glass-card::after { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; }

        .agency-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.65rem;
            color: var(--text-dark-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
            border-bottom: 1px dashed var(--border-tech);
            padding-bottom: 8px;
        }
        .agency-header .status-pulse {
            width: 6px; height: 6px; background: var(--accent-radar); border-radius: 50%; display: inline-block; margin-right: 4px;
            box-shadow: 0 0 8px var(--accent-radar); animation: pulseRadar 1.5s infinite;
        }
        @keyframes pulseRadar { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        h1 {
            font-size: 2.1rem;
            font-weight: 900;
            text-align: center;
            margin-bottom: 25px;
            letter-spacing: -0.5px;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }
        h1 span { color: var(--accent-radar); text-shadow: 0 0 15px var(--accent-radar-glow); }

        .screen { display: none; opacity: 0; }
        .screen.active { 
            display: block; 
            animation: bootTerminal 0.4s var(--apple-spring) forwards;
        }

        @keyframes bootTerminal {
            0% { opacity: 0; transform: translateY(12px) scale(0.97); filter: brightness(1.3); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: brightness(1); }
        }

        label {
            display: block; font-size: 0.7rem; text-transform: uppercase;
            letter-spacing: 1.5px; color: var(--detective-blue); margin-bottom: 8px; font-weight: 700;
        }

        .creation-zone {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-tech);
            border-radius: 14px;
            padding: 12px 14px;
            margin-bottom: 18px;
            gap: 12px;
            position: relative;
            transition: all 0.3s var(--apple-spring);
        }
        .creation-zone:focus-within {
            border-color: var(--detective-blue);
            box-shadow: 0 0 14px var(--detective-blue-glow);
        }

        .preview-avatar {
            width: 44px; height: 44px; border-radius: 50%;
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; transition: all 0.3s var(--apple-spring);
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* AJUSTEMENT CRUCIAL POUR L'INPUT SUR MOBILE */
        .creation-zone input {
            flex-grow: 1;
            min-width: 0; /* Empêche l'input de déborder sur mobile */
            background: none;
            border: none;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            outline: none;
            letter-spacing: 0.5px;
        }
        .creation-zone input::placeholder { color: var(--text-dark-muted); }

        /* SÉCURISATION DU BOUTON CONTRE L'ÉCRASEMENT */
        .add-player-btn {
            flex-shrink: 0; /* Interdit au bouton de se déformer */
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-tech);
            color: var(--detective-blue);
            width: 32px; height: 32px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.2s var(--apple-spring);
        }
        .add-player-btn svg {
            width: 16px; height: 16px; display: block;
            transition: transform 0.2s var(--apple-spring);
        }
        .add-player-btn:hover {
            background: rgba(0, 229, 255, 0.15);
            border-color: var(--detective-blue);
        }
        .add-player-btn:hover svg {
            transform: rotate(90deg);
        }
        .add-player-btn:active {
            transform: scale(0.9);
            background: var(--detective-blue);
            color: #07080a;
        }

        .mini-grid {
            display: flex; gap: 8px; overflow-x: auto; overflow-y: hidden;
            padding: 12px 8px 12px 8px; 
            margin-left: -8px; margin-right: -8px;
            scrollbar-width: none;
        }
        .mini-grid::-webkit-scrollbar { display: none; }
        
        .opt { 
            flex-shrink: 0; width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center; font-size: 1.1rem; 
            cursor: pointer; border-radius: 50%; transition: all 0.25s var(--apple-spring); 
            background: rgba(255,255,255,0.02); border: 1px solid var(--border-tech);
        }
        .opt:hover {
            transform: scale(1.08);
            background: rgba(255,255,255,0.06);
        }
        .opt.selected { 
            border-color: var(--detective-blue);
            background: rgba(0, 229, 255, 0.1);
            animation: bounceSelect 0.3s var(--apple-spring) forwards;
            box-shadow: 0 0 10px var(--detective-blue-glow);
        }
        @keyframes bounceSelect {
            0% { transform: scale(1); }
            50% { transform: scale(1.25); }
            100% { transform: scale(1.1); }
        }
        .color-dot { width: 14px; height: 14px; border-radius: 50%; }

        .config-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .config-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-tech);
            border-radius: 12px;
            padding: 0 12px;
            height: 50px;
            transition: border-color 0.2s;
        }
        .config-card:focus-within {
            border-color: rgba(255,255,255,0.15);
        }

        .config-card span {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-neon);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .config-card select {
            background: none; border: none; color: var(--accent-radar);
            font-size: 1rem; font-weight: 700; outline: none; cursor: pointer;
            direction: rtl; -webkit-appearance: none; appearance: none;
        }
        .config-card select option { background: #0e1117; color: white; }

        .switch { 
            position: relative; display: inline-block; 
            width: 42px; height: 22px; margin: 0; flex-shrink: 0;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(255,255,255,0.1); transition: .25s var(--apple-spring); border-radius: 34px; border: 1px solid rgba(255,255,255,0.05); }
        
        .slider:before { 
            position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px; 
            background-color: #ffffff; transition: .25s var(--apple-spring); border-radius: 50%; 
        }
        input:checked + .slider { background-color: var(--accent-radar); border-color: rgba(255,42,42,0.3); box-shadow: 0 0 8px var(--accent-radar-glow); }
        input:checked + .slider:before { transform: translateX(20px); }

        .lobby-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
            margin-top: 10px; max-height: 180px; overflow-y: auto; padding: 6px 6px 6px 2px;
        }
        
        .player-card {
            position: relative; display: flex; align-items: center;
            background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border-tech);
            padding: 8px 10px; border-radius: 10px;
            transform-origin: center;
            animation: cardPop 0.35s var(--apple-spring) forwards;
            transition: opacity 0.25s var(--apple-spring), transform 0.25s var(--apple-spring);
        }
        @keyframes cardPop { 0% { opacity: 0; transform: scale(0.85) translateY(5px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        .card-badge { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.95rem; margin-right: 8px; }
        .card-name { font-weight: 600; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 85px; }
        
        /* CROIX DE SUPPRESSION FLUIDE */
        .card-delete {
            position: absolute; top: -6px; right: -6px;
            width: 18px; height: 18px; 
            background: #1c212c; 
            color: var(--accent-radar);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 0.65rem; font-weight: 800; cursor: pointer; 
            border: 1px solid rgba(255, 42, 42, 0.4);
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            transition: all 0.2s var(--apple-spring);
            z-index: 10;
        }
        .card-delete:hover { 
            background: var(--accent-radar); 
            color: white; 
            transform: scale(1.15);
            box-shadow: 0 0 8px var(--accent-radar-glow);
        }
        .card-delete:active {
            transform: scale(0.85);
        }

        /* LISSAGE DES BOUTONS PRINCIPAUX */
        .btn {
            width: 100%; padding: 14px; background: var(--accent-radar); border: none; border-radius: 12px;
            color: white; font-size: 0.9rem; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 4px 15px var(--accent-radar-glow); transition: all 0.3s var(--apple-spring);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 42, 42, 0.5); }
        .btn:active { transform: translateY(0) scale(0.98); }
        .btn-secondary { background: rgba(255, 255, 255, 0.05); box-shadow: none; margin-top: 10px; color: var(--text-neon); border: 1px solid var(--border-tech); }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.08); box-shadow: none; transform: translateY(-1px); }

        /* BOUTON LANCER ULTRA FLUIDE */
        .btn-launch {
            opacity: 0;
            transform: translateY(15px);
            pointer-events: none;
            margin-top: 18px;
        }
        .btn-launch.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .pass-box { text-align: center; }
        .large-avatar { font-size: 3.5rem; margin-bottom: 15px; display: inline-block; padding: 16px; border-radius: 50%; background: rgba(255,255,255,0.02); }
        .secure-envelope { position: relative; background: #000000; border: 1px solid var(--border-tech); border-radius: 16px; padding: 35px 20px; margin: 25px 0; overflow: hidden; }
        .envelope-blur { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #0b0d13; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.4s ease; z-index: 2; opacity: 1; border: 1px solid rgba(0, 229, 255, 0.2); }
        .envelope-blur::before { content: ''; position: absolute; top:0; left:0; width:100%; height:2px; background: var(--detective-blue); box-shadow: 0 0 10px var(--detective-blue); animation: scanLine 2s linear infinite; }
        @keyframes scanLine { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }
        .envelope-blur.melted { opacity: 0; pointer-events: none; transform: scale(1.05); filter: blur(8px); }
        .secret-word { font-size: 2.2rem; font-weight: 900; color: #ffffff; letter-spacing: 1px; text-shadow: 0 0 15px rgba(255,255,255,0.2); text-transform: uppercase; }
        
        .elimination-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .elim-card { background: rgba(255,255,255,0.01); border: 1px solid var(--border-tech); padding: 16px; border-radius: 14px; text-align: center; cursor: pointer; transition: all 0.2s var(--apple-spring); position: relative; }
        .elim-card:hover { background: rgba(255,255,255,0.03); border-color: var(--detective-blue); transform: translateY(-2px); }
        .elim-card.dead { animation: killShake 0.4s var(--apple-spring) forwards; pointer-events: none; background: rgba(0,0,0,0.6); border-color: rgba(255,42,42,0.2); }
        @keyframes killShake { 0% { transform: scale(1); } 50% { transform: scale(0.95) rotate(-2deg); } 100% { transform: scale(1); opacity: 0.35; filter: grayscale(100%); } }
        .role-reveal { font-size: 0.75rem; font-weight: 800; margin-top: 6px; text-transform: uppercase; white-space: nowrap; }

        .recap-row { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: rgba(0,0,0,0.2); border-radius: 10px; margin-bottom: 8px; border: 1px solid var(--border-tech); }
        
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); justify-content: center; align-items: center; z-index: 9999; padding: 16px; opacity: 0; transition: opacity 0.25s ease; }
        .modal.active { display: flex; opacity: 1; }
        .modal-box { max-width: 320px; text-align: center; transform: scale(0.95); transition: transform 0.25s var(--apple-spring); border-color: var(--accent-radar); }
        .modal.active .modal-box { transform: scale(1); }

        /* SÉCURITÉ RESPONSIVE POUR PETITS ÉCRANS (IPHONE SE, ETC) */
        @media (max-width: 360px) {
            .glass-card { padding: 16px; }
            .creation-zone { padding: 10px; gap: 8px; }
            .preview-avatar { width: 38px; height: 38px; font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div class="glass-card">
    <div class="agency-header">
        <div><span class="status-pulse"></span>BUREAU DES OPÉRATIONS</div>
        <div style="color: var(--accent-radar);">CLASSIFIED // TOP SECRET</div>
    </div>

    <!-- ÉCRAN 1 : CONFIGURATION -->
    <div id="screen-setup" class="screen active">
        <h1><span>Under</span>cover</h1>
        
        <label>Enregistrement Suspect</label>
        <form class="creation-zone" onsubmit="event.preventDefault(); tryAddPlayer();">
            <div id="live-preview" class="preview-avatar">🦊</div>
            <input type="text" id="player-input" placeholder="Identifiant / Prénom..." maxlength="12" autocomplete="off">
            <button type="submit" class="add-player-btn" aria-label="Ajouter le joueur">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
        </form>
        
        <label>Matrice Visuelle (Optionnel)</label>
        <div class="mini-grid" id="avatar-box"></div>
        <div class="mini-grid" id="color-box"></div>

        <div class="config-row">
            <div class="config-card">
                <span>Infiltrés 🎭</span>
                <select id="undercover-count">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                </select>
            </div>
            <div class="config-card">
                <span>Mr. White 👤</span>
                <label class="switch">
                    <input type="checkbox" id="mrwhite-toggle">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <label style="margin-top: 12px;">Dossiers Actifs (<span id="p-count">0</span>/10)</label>
        <div class="lobby-grid" id="players-lobby"></div>
        
        <button class="btn btn-launch" id="start-btn">Lancer l'enquête</button>
    </div>

    <!-- ÉCRAN 2 : DECRYPTAGE -->
    <div id="screen-distribute" class="screen">
        <h1>Analyse <span>Profil</span></h1>
        <div class="pass-box">
            <div id="dist-avatar" class="large-avatar"></div>
            <h2 id="dist-name" style="margin-bottom: 5px; font-weight:800;">Agent</h2>
            
            <div class="secure-envelope">
                <div class="envelope-blur" id="envelope-shield">
                    <span style="font-size: 1.8rem; margin-bottom: 8px; color:var(--detective-blue);">⚡</span>
                    <p id="dist-instruction" style="font-size: 0.75rem; color: #a4b3c6; font-weight: 600; text-transform:uppercase; letter-spacing:0.5px;"></p>
                </div>
                <div id="word-display" class="secret-word">•••••</div>
            </div>
            
            <button class="btn" id="reveal-btn" style="background:var(--detective-blue); box-shadow:0 4px 15px var(--detective-blue-glow);">Décrypter le code</button>
            <button class="btn" id="next-player-btn" style="display: none;">Effacer & Suivant</button>
        </div>
    </div>

    <!-- ÉCRAN 3 : GRILLE DE VOTE -->
    <div id="screen-game" class="screen">
        <h1>Cellule de <span>Crise</span></h1>
        <p style="text-align: center; color: var(--text-dark-muted); margin-bottom: 20px; font-size: 0.75rem; text-transform:uppercase; letter-spacing:1px;">Délibérez. Éliminez le maillon faible.</p>
        <div class="elimination-grid" id="elim-grid"></div>
    </div>

    <!-- ÉCRAN 4 : RAPPORT FINAL -->
    <div id="screen-end" class="screen">
        <h2 id="win-message" style="font-size: 1.8rem; text-align:center; text-transform:uppercase; font-weight:900; margin-bottom:10px;">Enquête Clôturée</h2>
        <p id="words-summary" style="text-align: center; color: var(--text-dark-muted); margin-bottom: 20px; font-size: 0.85rem; line-height:1.4;"></p>
        <label>Rapport d'identité final</label>
        <div id="end-recap-list" style="margin-bottom: 20px;"></div>
        <button class="btn" id="btn-replay">Nouvelle Enquête</button>
        <button class="btn btn-secondary" onclick="location.reload()">Réinitialiser l'équipe</button>
    </div>
</div>

<!-- MODAL DE CONFIRMATION -->
<div id="confirm-modal" class="modal">
    <div class="glass-card modal-box">
        <h3 id="modal-title" style="margin-bottom: 18px; font-size: 1.1rem; font-weight: 800; text-transform:uppercase; letter-spacing:0.5px;">Neutraliser la cible ?</h3>
        <button class="btn" id="btn-modal-confirm">Confirmer l'élimination</button>
        <button class="btn btn-secondary" id="btn-modal-cancel">Annuler</button>
    </div>
</div>

<script>

        ["Fraise", "Framboise"], ["Pain", "Brioche"], ["Beurre", "Margarine"], ["Sucre", "Sel"],

        ["Ketchup", "Moutarde"], ["Frites", "Potatoes"], ["Miel", "Confiture"], ["Glace", "Sorbet"],
        ["Tomate", "Salade"], ["Orange", "Pamplemousse"], ["Fromage", "Yaourt"], ["Poisson", "Viande"],
        ["Poulet", "Dinde"], ["Gâteau", "Tarte"], ["Biscuit", "Cookie"], ["Soupe", "Bouillon"],

        ["Sushi", "Maki"], ["Champagne", "Cidre"], ["Bière", "Vin"], ["Whisky", "Rhum"],
        ["Huile", "Vinaigre"], ["Purée", "Gratin"], ["Semoule", "Quinoa"], ["Melon", "Pastèque"],
        ["Singe", "Gorille"], ["Lion", "Tigre"], ["Chien", "Loup"], ["Chat", "Panthère"],
        ["Soleil", "Lune"], ["Plage", "Piscine"], ["Mer", "Océan"], ["Forêt", "Jungle"],
        ["Pluie", "Neige"], ["Montagne", "Colline"], ["Rivière", "Fleuve"], ["Arbre", "Arbuste"],
        ["Cheval", "Poney"], ["Dauphin", "Baleine"], ["Aigle", "Faucon"], ["Requin", "Dauphin"],
        ["Renard", "Loup"], ["Souris", "Rat"], ["Hamster", "Cochon d'Inde"], ["Vache", "Taureau"],
        ["Mouton", "Chèvre"], ["Oiseau", "Papillon"], ["Mouche", "Moustique"], ["Abeille", "Guêpe"],

        ["Statue", "Monument"], ["Prison", "Cellule"], ["Banque", "Coffre-fort"], ["Loi", "Règle"],
        ["Matin", "Soir"], ["Jour", "Nuit"], ["Jeune", "Enfant"], ["Vieux", "Ancien"],
        ["Nord", "Sud"], ["Est", "Ouest"], ["Planète", "Galaxie"], ["Île", "Presqu'île"],
        ["Ville", "Village"], ["Capital", "Métropole"], ["Route", "Autoroute"], ["Pont", "Tunnel"]

    const avatars = ["🦊","🐱","🐼","🦁","🐸","🐵","🦄","🐙","🐉","🥷","🐻","🐨","🐰","🐭","🐷","🐮","🐹","🐔"];
    const colors = [
        "#FF3B30", "#FF9500", "#FFCC00", "#34C759", "#00e5ff", 
        "#007AFF", "#5856D6", "#AF52DE", "#FF2D55", "#EC4899", 
        "#F43F5E", "#10B981", "#F59E0B", "#ffffff"
    ];

    let players = [];
    let currentAvatar = "";
    let currentColor = "";
    let currentDistributeIndex = 0;
    let selectedPair = [];
    let playerToEliminate = null;

    function rollRandomSetup() {
        currentAvatar = avatars[Math.floor(Math.random() * avatars.length)];
        currentColor = colors[Math.floor(Math.random() * colors.length)];
        
        document.querySelectorAll('#avatar-box .opt').forEach(el => el.classList.remove('selected'));
        document.querySelectorAll('#color-box .opt').forEach(el => el.classList.remove('selected'));
        
        const avNodes = document.querySelectorAll('#avatar-box .opt');
        const colNodes = document.querySelectorAll('#color-box .opt');
        
        for(let n of avNodes) if(n.innerText === currentAvatar) n.classList.add('selected');
        for(let n of colNodes) if(n.dataset.color === currentColor) n.classList.add('selected');

        updatePreview();
    }

    function updatePreview() {
        const preview = document.getElementById('live-preview');
        preview.innerText = currentAvatar;
        preview.style.background = `${currentColor}12`;
        preview.style.color = currentColor;
        preview.style.border = `1px solid ${currentColor}40`;
    }

    const avatarBox = document.getElementById('avatar-box');
    avatars.forEach(av => {
        let div = document.createElement('div');
        div.className = 'opt';
        div.innerText = av;
        div.onclick = () => {
            document.querySelectorAll('#avatar-box .opt').forEach(el=>el.classList.remove('selected'));
            div.classList.add('selected');
            currentAvatar = av;
            updatePreview();
        };
        avatarBox.appendChild(div);
    });

    const colorBox = document.getElementById('color-box');
    colors.forEach(col => {
        let div = document.createElement('div');
        div.className = 'opt';
        div.dataset.color = col;
        div.innerHTML = `<div class="color-dot" style="background:${col}"></div>`;
        div.onclick = () => {
            document.querySelectorAll('#color-box .opt').forEach(el=>el.classList.remove('selected'));
            div.classList.add('selected');
            currentColor = col;
            updatePreview();
        };
        colorBox.appendChild(div);
    });

    rollRandomSetup();

    const nameInput = document.getElementById('player-input');
    
    function tryAddPlayer() {
        const name = nameInput.value.trim();
        if(!name || players.length >= 10) return;

        players.push({ name: name, avatar: currentAvatar, color: currentColor, role: 'Civil', alive: true, word: '' });
        nameInput.value = '';
        
        updateLobbyGrid();
        rollRandomSetup();
        nameInput.focus();
    }

    function updateLobbyGrid() {
        const lobby = document.getElementById('players-lobby');
        lobby.innerHTML = '';
        players.forEach((p, index) => {
            lobby.innerHTML += `
                <div class="player-card">
                    <div class="card-badge" style="background:${p.color}15; color:${p.color}; border: 1px solid ${p.color}35">${p.avatar}</div>
                    <div class="card-name">${p.name}</div>
                    <div class="card-delete" onclick="removePlayer(${index}, this)">✕</div>
                </div>
            `;
        });
        document.getElementById('p-count').innerText = players.length;
        
        const startBtn = document.getElementById('start-btn');
        if(players.length >= 3) {
            startBtn.classList.add('visible');
        } else {
            startBtn.classList.remove('visible');
        }
    }

    window.removePlayer = (index, buttonEl) => {
        const card = buttonEl.closest('.player-card');
        card.style.pointerEvents = 'none';
        card.style.opacity = '0';
        card.style.transform = 'scale(0.8) translateY(-10px)';
        
        setTimeout(() => {
            players.splice(index, 1);
            updateLobbyGrid();
        }, 220);
    };

    document.getElementById('start-btn').onclick = () => { initRound(); };
    document.getElementById('btn-replay').onclick = () => { initRound(); };

    function initRound() {
        const ucCount = parseInt(document.getElementById('undercover-count').value);
        const hasWhite = document.getElementById('mrwhite-toggle').checked;
        if((ucCount + (hasWhite ? 1 : 0)) >= players.length - 1) {
            alert("Configuration invalide : Trop d'intrus.");
            return;
        }

        players.forEach(p => { p.alive = true; p.role = 'Civil'; p.word = ''; });
        let pool = Array(players.length).fill('Civil');
        let indexFilled = 0;
        for(let i=0; i<ucCount; i++) pool[indexFilled++] = 'Undercover';
        if(hasWhite) pool[indexFilled++] = 'Mr. White';
        pool.sort(() => Math.random() - 0.5);

        selectedPair = wordBank[Math.floor(Math.random() * wordBank.length)];
        const flip = Math.random() > 0.5;
        const civilWord = flip ? selectedPair[0] : selectedPair[1];
        const ucWord = flip ? selectedPair[1] : selectedPair[0];

        players.forEach((p, i) => {
            p.role = pool[i];
            if(p.role === 'Civil') p.word = civilWord;
            else if(p.role === 'Undercover') p.word = ucWord;
            else p.word = "👤 Tu es Mr. White";
        });

        currentDistributeIndex = 0;
        switchScreen('screen-distribute');
        showDistributeCard();
    }

    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function showDistributeCard() {
        const p = players[currentDistributeIndex];
        document.getElementById('dist-avatar').innerText = p.avatar;
        document.getElementById('dist-avatar').style.background = `${p.color}12`;
        document.getElementById('dist-avatar').style.border = `1px solid ${p.color}35`;
        document.getElementById('dist-avatar').style.color = p.color;
        document.getElementById('dist-name').innerText = p.name;
        
        document.getElementById('word-display').innerText = "•••••";
        document.getElementById('envelope-shield').classList.remove('melted');
        document.getElementById('dist-instruction').innerText = `TRANSFERT SÉCURISÉ À : ${p.name}`;
        
        document.getElementById('reveal-btn').style.display = 'block';
        document.getElementById('next-player-btn').style.display = 'none';
    }

    document.getElementById('reveal-btn').onclick = () => {
        document.getElementById('word-display').innerText = players[currentDistributeIndex].word;
        document.getElementById('envelope-shield').classList.add('melted');
        document.getElementById('reveal-btn').style.display = 'none';
        document.getElementById('next-player-btn').style.display = 'block';
    };

    document.getElementById('next-player-btn').onclick = () => {
        currentDistributeIndex++;
        if(currentDistributeIndex < players.length) {
            document.getElementById('envelope-shield').classList.remove('melted');
            setTimeout(showDistributeCard, 200);
        } else {
            setupGameBoard();
            switchScreen('screen-game');
        }
    };

    function setupGameBoard() {
        const grid = document.getElementById('elim-grid');
        grid.innerHTML = '';
        players.forEach((p, i) => {
            grid.innerHTML += `
                <div class="elim-card" id="card-${i}" onclick="openElimationModal(${i})">
                    <div style="font-size: 2rem; margin-bottom: 6px;">${p.avatar}</div>
                    <div style="font-weight: 700; font-size:1rem; letter-spacing:0.5px;">${p.name}</div>
                    <div class="role-reveal" id="reveal-${i}" style="color:transparent;">Opérationnel</div>
                </div>
            `;
        });
    }

    window.openElimationModal = (index) => {
        if(!players[index].alive) return;
        playerToEliminate = index;
        document.getElementById('modal-title').innerText = `Neutraliser l'agent ${players[index].name} ?`;
        const modal = document.getElementById('confirm-modal');
        modal.style.display = 'flex';
        setTimeout(() => modal.classList.add('active'), 10);
    };

    function closeModal() {
        const modal = document.getElementById('confirm-modal');
        modal.classList.remove('active');
        setTimeout(() => modal.style.display = 'none', 250);
        playerToEliminate = null;
    }

    document.getElementById('btn-modal-cancel').onclick = closeModal;

    document.getElementById('btn-modal-confirm').onclick = () => {
        if(playerToEliminate !== null) {
            const index = playerToEliminate;
            const p = players[index];
            p.alive = false;
            
            const card = document.getElementById(`card-${index}`);
            const reveal = document.getElementById(`reveal-${index}`);
            
            card.classList.add('dead');
            reveal.innerText = p.role === 'Mr. White' ? 'Mr. White 👤' : p.role;
            
            if(p.role === 'Civil') reveal.style.color = 'var(--status-clear)';
            else if(p.role === 'Undercover') reveal.style.color = 'var(--accent-radar)';
            else reveal.style.color = '#ffffff';
            
            closeModal();
            setTimeout(checkGameEnd, 600);
        }
    };

    function checkGameEnd() {
        const alives = players.filter(p => p.alive);
        const ucs = alives.filter(p => p.role === 'Undercover').length;
        const whites = alives.filter(p => p.role === 'Mr. White').length;
        const civils = alives.filter(p => p.role === 'Civil').length;

        if(ucs === 0 && whites === 0) showEndGameScreen("VICTOIRE DES CIVILS 🎉");
        else if((ucs + whites) >= civils) showEndGameScreen("LES INTRUS ONT GAGNÉ 🎭");
    }

    function showEndGameScreen(title) {
        document.getElementById('win-message').innerText = title;
        if(title.includes("CIVILS")) {
            document.getElementById('win-message').style.color = 'var(--status-clear)';
        } else {
            document.getElementById('win-message').style.color = 'var(--accent-radar)';
        }

        const civWord = players.find(p => p.role === 'Civil').word;
        const ucWord = players.find(p => p.role === 'Undercover')?.word || "Aucun";
        document.getElementById('words-summary').innerHTML = `Clé Civils : <strong style="color:var(--status-clear)">${civWord}</strong><br>Clé Infiltrés : <strong style="color:var(--accent-radar)">${ucWord}</strong>`;

        const recapList = document.getElementById('end-recap-list');
        recapList.innerHTML = '';
        players.forEach(p => {
            let colorRole = p.role === 'Undercover' ? 'var(--accent-radar)' : (p.role === 'Mr. White' ? '#ffffff' : 'var(--status-clear)');
            recapList.innerHTML += `
                <div class="recap-row" style="border-left: 3px solid ${colorRole}; opacity: ${p.alive ? '1' : '0.4'}">
                    <div style="display:flex; align-items:center;">
                        <span style="font-size:1.1rem; margin-right:10px;">${p.avatar}</span>
                        <span style="font-weight:700; font-size:0.9rem;">${p.name}</span>
                    </div>
                    <span style="font-size:0.75rem; font-weight:800; color:${colorRole}; text-transform:uppercase; letter-spacing:0.5px;">${p.role} ${p.alive ? '✓' : '☠'}</span>
                </div>
            `;
        });
        switchScreen('screen-end');
    }
</script>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undercover - Vacation Edition</title>
    <style>
        :root {
            --bg-color: #0A0A0C;
            --accent-red: #FF3B30;
            --accent-red-glow: rgba(255, 59, 48, 0.3);
            --glass-bg: rgba(22, 22, 26, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #F5F5F7;
            --text-muted: #8E8E93;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-color);
            background-image: radial-gradient(circle at 50% -20%, rgba(255, 59, 48, 0.18), transparent 70%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Style Liquid Glass (Apple) */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 25px;
            letter-spacing: -0.5px;
            background: linear-gradient(180deg, #FFFFFF 0%, #A1A1A6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h1 span {
            color: var(--accent-red);
            -webkit-text-fill-color: initial;
        }

        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Formulaire et boutons */
        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
        }

        input[type="text"], select {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--accent-red);
            box-shadow: 0 0 10px var(--accent-red-glow);
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: var(--accent-red);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--accent-red-glow);
            transition: transform 0.2s, cubic-bezier(0.25, 1, 0.5, 1) 0.2s;
        }

        .btn:active { transform: scale(0.98); }
        .btn-secondary { background: rgba(255, 255, 255, 0.1); box-shadow: none; margin-top: 10px;}

        /* Personnages et Couleurs */
        .customizer {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .avatar-select, .color-select {
            flex: 1;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            max-height: 120px;
            overflow-y: auto;
            padding: 5px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            display: none;
        }

        .avatar-select.open, .color-select.open { display: grid; }

        .selector-toggle {
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            border: 1px solid var(--glass-border);
            font-size: 0.9rem;
        }

        .opt {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            padding: 8px;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.2s;
        }
        .opt:hover { background: rgba(255,255,255,0.1); }
        .opt.selected { border: 2px solid var(--accent-red); background: rgba(255,59,48,0.15); }

        .color-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
        }

        /* Listes de joueurs */
        .player-tag {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.04);
            padding: 10px 14px;
            border-radius: 12px;
            margin-bottom: 8px;
            border: 1px solid var(--glass-border);
        }

        .player-badge {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-size: 1.1rem;
        }

        .player-name { flex-grow: 1; font-weight: 500; }
        .delete-btn { color: var(--accent-red); cursor: pointer; background: none; border: none; font-size: 1.1rem; padding: 0 5px; }

        /* Écrans de Jeu */
        .pass-box {
            text-align: center;
            padding: 40px 20px;
        }
        .large-avatar { font-size: 4.5rem; margin-bottom: 15px; display: inline-block; padding: 15px; border-radius: 50%; }
        .secret-word {
            font-size: 2rem;
            font-weight: 700;
            color: #white;
            margin: 25px 0;
            letter-spacing: 1px;
            text-shadow: 0 0 15px var(--accent-red-glow);
        }

        .elimination-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .elim-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .elim-card.dead {
            opacity: 0.35;
            text-decoration: line-through;
            pointer-events: none;
            background: rgba(0,0,0,0.4);
        }
        
        .role-reveal {
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 5px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="glass-card">
    <!-- ÉCRAN 1 : AJOUT JOUEURS -->
    <div id="screen-setup" class="screen active">
        <h1><span>Under</span>cover</h1>
        <div class="input-group">
            <label>Nouveau Joueur (<span id="p-count">0</span>/10)</label>
            <input type="text" id="player-input" placeholder="Nom du joueur..." maxlength="12">
        </div>
        
        <div class="customizer">
            <div class="selector-toggle" id="toggle-avatar">Perso : 🦊</div>
            <div class="selector-toggle" id="toggle-color">Couleur : 🔴</div>
        </div>

        <div class="avatar-select" id="avatar-box"></div>
        <div class="color-select" id="color-box"></div>

        <button class="btn btn-secondary" id="add-btn" style="margin-bottom: 25px;">Ajouter le joueur</button>
        
        <div class="input-group">
            <label>Nombre d'Undercovers</label>
            <select id="undercover-count">
                <option value="1">1 Undercover</option>
                <option value="2">2 Undercovers</option>
                <option value="3">3 Undercovers</option>
            </select>
        </div>

        <div id="players-list" style="margin-bottom: 20px;"></div>
        <button class="btn" id="start-btn" style="display:none;">Lancer la partie</button>
    </div>

    <!-- ÉCRAN 2 : DISTRIBUTION DES MOTS (ANTI-TRICHE) -->
    <div id="screen-distribute" class="screen">
        <h1>Mot <span>Secret</span></h1>
        <div class="pass-box">
            <div id="dist-avatar" class="large-avatar"></div>
            <h2 id="dist-name" style="margin-bottom: 10px;">Joueur</h2>
            <p id="dist-instruction" style="color: var(--text-muted);">Donne le téléphone à cette personne.</p>
            
            <div id="word-display" class="secret-word" style="display: none;">???</div>
            
            <button class="btn" id="reveal-btn">Révéler mon mot</button>
            <button class="btn" id="next-player-btn" style="display: none;">C'est bon, j'ai retenu</button>
        </div>
    </div>

    <!-- ÉCRAN 3 : DEROULEMENT DU JEU & ELIMINATION -->
    <div id="screen-game" class="screen">
        <h1>Tableau de <span>Vote</span></h1>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 20px; font-size: 0.9rem;">
            Débattez, puis éliminez un suspect en cliquant dessus.
        </p>
        <div class="elimination-grid" id="elim-grid"></div>
        <button class="btn btn-secondary" onclick="location.reload()">Recommencer</button>
    </div>
</div>

<script>
    // Banque de mots (Gros potentiel d'extension de paires sémantiques proches)
    const wordBank = [
        ["Pomme", "Poire"], ["Singe", "Gorille"], ["Guitare", "Ukulélé"], ["Café", "Thé"],
        ["Crayon", "Stylo"], ["Lion", "Tigre"], ["Moto", "Scooter"], ["Plage", "Piscine"],
        ["Ordinateur", "Tablette"], ["Livre", "Magazine"], ["Chocolat", "Caramel"], ["Avion", "Hélicoptère"],
        ["Chien", "Loup"], ["Bateau", "Sous-marin"], ["Soleil", "Lune"], ["Riz", "Pâtes"],
        ["Fraise", "Framboise"], ["Tapis", "Moquette"], ["Fenêtre", "Porte"], ["Chapeau", "Casquette"]
    ];

    const avatars = ["🦊","🐱","🐼","🦁","🐸","🐵","🦄","🐙","🐉","🥷","🐻","🐨","🐰","🐭"];
    const colors = ["#FF3B30", "#FF9500", "#FFCC00", "#34C759", "#007AFF", "#5856D6", "#AF52DE", "#FF2D55"];

    let players = [];
    let selectedAvatar = avatars[0];
    let selectedColor = colors[0];
    let currentDistributeIndex = 0;
    let selectedPair = [];

    // Init customizer
    const avatarBox = document.getElementById('avatar-box');
    const colorBox = document.getElementById('color-box');
    
    avatars.forEach((av, i) => {
        let div = document.createElement('div');
        div.className = `opt ${i===0?'selected':''}`;
        div.innerText = av;
        div.onclick = () => {
            document.querySelectorAll('#avatar-box .opt').forEach(el=>el.classList.remove('selected'));
            div.classList.add('selected');
            selectedAvatar = av;
            document.getElementById('toggle-avatar').innerText = `Perso : ${av}`;
            avatarBox.classList.remove('open');
        };
        avatarBox.appendChild(div);
    });

    colors.forEach((col, i) => {
        let div = document.createElement('div');
        div.className = `opt ${i===0?'selected':''}`;
        div.innerHTML = `<div class="color-dot" style="background:${col}"></div>`;
        div.onclick = () => {
            document.querySelectorAll('#color-box .opt').forEach(el=>el.classList.remove('selected'));
            div.classList.add('selected');
            selectedColor = col;
            document.getElementById('toggle-color').innerText = `Couleur : 🔴`;
            document.getElementById('toggle-color').style.color = col;
            colorBox.classList.remove('open');
        };
        colorBox.appendChild(div);
    });

    document.getElementById('toggle-avatar').onclick = () => { avatarBox.classList.toggle('open'); colorBox.classList.remove('open'); };
    document.getElementById('toggle-color').onclick = () => { colorBox.classList.toggle('open'); avatarBox.classList.remove('open'); };

    // Logique d'ajout joueur
    document.getElementById('add-btn').onclick = () => {
        const nameInput = document.getElementById('player-input');
        const name = nameInput.value.trim();
        if(!name) return;
        if(players.length >= 10) return alert("Maximum 10 joueurs !");

        players.push({
            name: name,
            avatar: selectedAvatar,
            color: selectedColor,
            role: 'Civil',
            alive: true,
            word: ''
        });

        nameInput.value = '';
        updatePlayersList();
    };

    function updatePlayersList() {
        const list = document.getElementById('players-list');
        list.innerHTML = '';
        players.forEach((p, index) => {
            list.innerHTML += `
                <div class="player-tag">
                    <div class="player-badge" style="background:${p.color}20; color:${p.color}; border: 1px solid ${p.color}40">${p.avatar}</div>
                    <div class="player-name">${p.name}</div>
                    <button class="delete-btn" onclick="removePlayer(${index})">✕</button>
                </div>
            `;
        });
        document.getElementById('p-count').innerText = players.length;
        document.getElementById('start-btn').style.display = players.length >= 3 ? 'block' : 'none';
    }

    window.removePlayer = (index) => {
        players.splice(index, 1);
        updatePlayersList();
    };

    // Lancement de partie
    document.getElementById('start-btn').onclick = () => {
        const ucCount = parseInt(document.getElementById('undercover-count').value);
        if(ucCount >= players.length - 1) {
            alert("Trop d'Undercovers pour le nombre de joueurs !");
            return;
        }

        // Attribution des rôles
        let roles = Array(players.length).fill('Civil');
        let ucAssigned = 0;
        while(ucAssigned < ucCount) {
            let rand = Math.floor(Math.random() * players.length);
            if(roles[rand] === 'Civil') {
                roles[rand] = 'Undercover';
                ucAssigned++;
            }
        }

        // Choix des mots
        selectedPair = wordBank[Math.floor(Math.random() * wordBank.length)];
        const flip = Math.random() > 0.5;
        const civilWord = flip ? selectedPair[0] : selectedPair[1];
        const ucWord = flip ? selectedPair[1] : selectedPair[0];

        players.forEach((p, i) => {
            p.role = roles[i];
            p.word = p.role === 'Civil' ? civilWord : ucWord;
        });

        // Aller à l'écran de distribution
        switchScreen('screen-distribute');
        showDistributeCard();
    };

    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function showDistributeCard() {
        const p = players[currentDistributeIndex];
        document.getElementById('dist-avatar').innerText = p.avatar;
        document.getElementById('dist-avatar').style.background = `${p.color}20`;
        document.getElementById('dist-avatar').style.border = `2px solid ${p.color}`;
        document.getElementById('dist-name').innerText = p.name;
        document.getElementById('dist-instruction').innerText = `Donne le téléphone à ${p.name}. Les autres, fermez les yeux !`;
        
        document.getElementById('word-display').style.display = 'none';
        document.getElementById('reveal-btn').style.display = 'block';
        document.getElementById('next-player-btn').style.display = 'none';
    }

    document.getElementById('reveal-btn').onclick = () => {
        const p = players[currentDistributeIndex];
        const display = document.getElementById('word-display');
        display.innerText = p.word;
        display.style.display = 'block';
        document.getElementById('reveal-btn').style.display = 'none';
        document.getElementById('next-player-btn').style.display = 'block';
        document.getElementById('dist-instruction').innerText = "Retiens bien ton mot et cache l'écran !";
    };

    document.getElementById('next-player-btn').onclick = () => {
        currentDistributeIndex++;
        if(currentDistributeIndex < players.length) {
            showDistributeCard();
        } else {
            setupGameBoard();
            switchScreen('screen-game');
        }
    };

    // Plateau de jeu final
    function setupGameBoard() {
        const grid = document.getElementById('elim-grid');
        grid.innerHTML = '';
        players.forEach((p, i) => {
            grid.innerHTML += `
                <div class="elim-card" id="card-${i}" onclick="eliminatePlayer(${i})">
                    <div style="font-size: 2rem; margin-bottom: 5px;">${p.avatar}</div>
                    <div style="font-weight: 600;">${p.name}</div>
                    <div class="role-reveal" id="reveal-${i}" style="color:transparent;">En vie</div>
                </div>
            `;
        });
    }

    window.eliminatePlayer = (index) => {
        const p = players[index];
        if(!p.alive) return;
        
        if(confirm(`Éliminer ${p.name} ?`)) {
            p.alive = false;
            const card = document.getElementById(`card-${index}`);
            const reveal = document.getElementById(`reveal-${index}`);
            
            card.classList.add('dead');
            reveal.innerText = p.role;
            reveal.style.color = p.role === 'Undercover' ? 'var(--accent-red)' : '#34C759';
            
            checkGameEnd();
        }
    };

    function checkGameEnd() {
        const alives = players.filter(p => p.alive);
        const ucs = alives.filter(p => p.role === 'Undercover');
        const civils = alives.filter(p => p.role === 'Civil');

        if(ucs.length === 0) {
            alert("Victoire des Civils ! Tous les Undercovers ont été éliminés. Les mots étaient : " + selectedPair.join(' / '));
        } else if(ucs.length >= civils.length) {
            alert("Victoire des Undercovers ! Ils ont pris le contrôle. Les mots étaient : " + selectedPair.join(' / '));
        }
    }
</script>

</body>
</html>
